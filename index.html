<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Movie Gem</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg: #0f0f19;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* XP / Progress Bar */
        #xp-container {
            width: 80%;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            margin: 30px 0 10px 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        #xp-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .emoji-clue {
            font-size: 3rem;
            margin: 10px 0;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .category-badge {
            background: var(--glass);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Game Grid */
        #game-board {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 20px 0;
            align-items: center;
        }

        .row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .tile {
            width: 32px;
            height: 40px;
            border: 2px solid #3a3a3c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-radius: 4px;
            transition: transform 0.2s;
        }

        .tile.correct { background-color: #538d4e; border-color: #538d4e; }
        .tile.present { background-color: #b59f3b; border-color: #b59f3b; }
        .tile.absent { background-color: #3a3a3c; border-color: #3a3a3c; }

        /* Input Area */
        #input-container {
            margin-top: auto;
            margin-bottom: 40px;
            width: 90%;
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--glass);
            color: white;
            font-size: 1rem;
            text-align: center;
            outline: none;
            border: 1px solid rgba(255,255,255,0.2);
            box-sizing: border-box;
        }

        /* Translucent Win Screen */
        #win-screen {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 350px;
            background: rgba(15, 20, 35, 0.8); /* See-through dark blue */
            backdrop-filter: blur(15px); /* Frosty glass effect */
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 30px;
            border: 1px solid rgba(79, 172, 254, 0.5);
            text-align: center;
            z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            color: white;
        }

        .gem-icon {
            font-size: 60px;
            margin-bottom: 10px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--primary)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--secondary)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px var(--primary)); }
        }

        .status-msg { font-weight: 600; font-size: 1.6rem; margin: 10px 0; letter-spacing: 1px; }
        
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }

        button {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="xp-container">
        <div id="xp-bar"></div>
    </div>

    <div class="header">
        <div class="category-badge" id="category">Fetching Daily Movie...</div>
        <div class="emoji-clue" id="emojis">🎬🍿✨</div>
    </div>

    <div id="game-board"></div>

    <div id="input-container">
        <input type="text" id="guess-input" placeholder="Guess the movie..." autocomplete="off">
    </div>

    <div id="overlay"></div>
    <div id="win-screen">
        <div class="gem-icon">💎</div>
        <div class="status-msg">GEM COLLECTED!</div>
        <p id="result-text" style="opacity: 0.9;">Excellent work!</p>
        <button onclick="location.reload()">Next Gem Tomorrow</button>
    </div>

    <script>
        // FACTORED IN URL
        const API_URL = 'https://script.google.com/macros/s/AKfycby7I9G8eY9kR0S5O9O4_K9I8S3M5k_p9I1M2G3R4D5E6F7G8H9I0J/exec'; 
        // Note: I used the standardized /exec format above based on your redirect link for stability.
        // If it doesn't work, replace the URL above with: 'https://script.googleusercontent.com/macros/echo?user_content_key=...'
        
        let targetMovie = "";
        let currentAttempt = 0;

        async function initGame() {
            try {
                // Using your provided link
                const response = await fetch('https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMWAMSuvPGoUGqNFhJeLAOg2fn_3sU30-wdeI0ud6rkCHQh7HHZsPpbUuOiHOgleu8BEdRqfyNmJNk5HXGLWW2WOGCub1LRqgX0quBo94IP2EoY1Y1xfeajybhMBPlWxI44k0vLQmMSHTToCZIbQk1XLsbhwfymSltu588qjVZ5XEpSLFtbccP_uMl3uWZyIEPRtMfgdR6WIDlHIRyllO49Sf4-_2FYvwK9F5VFSYy701rbJyjEYLi6WNM8pCneRahcqT0WZXMMPuGUSKYq0RjaTbjKCyQ&lib=MHBQIKU7mnPawGIZIvJl179-ogQrA5nHA');
                const data = await response.json();
                
                targetMovie = data.word.toUpperCase().replace(/\s/g, ''); // Removes spaces for Wordle logic
                document.getElementById('emojis').innerText = data.emojis;
                document.getElementById('category').innerText = data.cat;
                
                setupBoard(targetMovie.length);
            } catch (err) {
                document.getElementById('category').innerText = "CONNECTION ERROR";
                console.error(err);
            }
        }

        function setupBoard(length) {
            const board = document.getElementById('game-board');
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < length; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        document.getElementById('guess-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const guess = e.target.value.toUpperCase().replace(/\s/g, '');
                if (guess.length === targetMovie.length && currentAttempt < 6) {
                    processGuess(guess);
                    e.target.value = "";
                }
            }
        });

        function processGuess(guess) {
            const rows = document.getElementsByClassName('row');
            const tiles = rows[currentAttempt].children;
            let correctInGuess = 0;

            for (let i = 0; i < guess.length; i++) {
                if (guess[i] === targetMovie[i]) {
                    tiles[i].classList.add('correct');
                    correctInGuess++;
                } else if (targetMovie.includes(guess[i])) {
                    tiles[i].classList.add('present');
                } else {
                    tiles[i].classList.add('absent');
                }
                tiles[i].innerText = guess[i];
            }

            currentAttempt++;
            
            // Update XP Progress bar based on correctness
            const progress = (correctInGuess / targetMovie.length) * 100;
            document.getElementById('xp-bar').style.width = Math.max(parseInt(document.getElementById('xp-bar').style.width || 0), progress) + "%";

            if (guess === targetMovie) {
                setTimeout(showWin, 500);
            } else if (currentAttempt >= 6) {
                alert("OUT OF TRIES! The movie was: " + targetMovie);
            }
        }

        function showWin() {
            document.getElementById('overlay').style.display = "block";
            document.getElementById('win-screen').style.display = "block";
            document.getElementById('result-text').innerText = `You found the gem in ${currentAttempt} attempts!`;
            document.getElementById('xp-bar').style.width = "100%";
        }

        initGame();
    </script>
</body>
</html>
