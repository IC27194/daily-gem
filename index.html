<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movie Gem Daily</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg: #0b0c14;
            --tile-bg: #1a1b26;
            --tile-border: #2f334d;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --kb-key: #818384;
            --glass: rgba(255, 255, 255, 0.05);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 10% 10%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(0, 242, 254, 0.08) 0px, transparent 50%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            max-width: 420px;
            margin: 15px 0 10px 0;
        }

        .stat-item {
            background: var(--glass);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #xp-container {
            width: 90%;
            max-width: 420px;
            height: 10px;
            background-color: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #xp-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.7);
            transition: width 0.8s ease;
        }

        .category-badge {
            background: rgba(79, 172, 254, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .emoji-clue {
            font-size: 2.8rem;
            margin: 10px 0;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        #game-board {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: auto;
        }

        .row { display: flex; gap: 5px; justify-content: center; }

        .tile {
            width: 36px;
            height: 44px;
            background-color: var(--tile-bg);
            border: 2px solid var(--tile-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tile.pop { transform: scale(1.1); border-color: #565f89; }
        .tile.correct { background-color: var(--correct); border-color: var(--correct); }
        .tile.present { background-color: var(--present); border-color: var(--present); }
        .tile.absent { background-color: var(--absent); border-color: var(--absent); }

        .tile.flip { animation: flipIn 0.5s ease forwards; }
        @keyframes flipIn {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        #keyboard {
            width: 100%;
            max-width: 500px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px 20px 0 0;
        }

        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }

        .key {
            background: var(--kb-key);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 16px 0;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
            max-width: 40px;
            display: flex; align-items: center; justify-content: center;
        }

        .key.wide { max-width: 65px; flex: 1.5; font-size: 0.75rem; }
        .key.correct { background-color: var(--correct); }
        .key.present { background-color: var(--present); }
        .key.absent { background-color: #242529; opacity: 0.5; }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 340px;
            background: rgba(18, 20, 32, 0.85);
            backdrop-filter: blur(20px);
            padding: 40px 20px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .action-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 30px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div class="stat-item">💎 <span id="gem-count">0</span></div>
        <div class="category-badge" id="category">Fetching...</div>
        <div class="stat-item">🔥 <span id="streak-count">0</span></div>
    </div>

    <div id="xp-container">
        <div id="xp-bar"></div>
    </div>

    <div class="emoji-clue" id="emojis">🎬🍿✨</div>
    <div id="game-board"></div>

    <div id="keyboard">
        <div class="kb-row" id="kb1"></div>
        <div class="kb-row" id="kb2"></div>
        <div class="kb-row" id="kb3"></div>
    </div>

    <div id="overlay"></div>
    <div id="win-screen" class="modal">
        <div style="font-size: 4rem;">💎</div>
        <h2 style="margin: 10px 0;">GEM COLLECTED!</h2>
        <p id="win-msg"></p>
        <button class="action-btn" onclick="location.reload()">Next Gem Tomorrow</button>
    </div>

    <div id="lose-screen" class="modal">
        <div style="font-size: 4rem;">🥺</div>
        <h2>OUT OF TRIES</h2>
        <p id="lose-msg"></p>
        <button class="action-btn" onclick="location.reload()">Try Again Tomorrow</button>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyW2C-L9ud-uFn_e3QOJoRzn49lafCMh5PiiB7-VakJMb89F86TdEowo9uD5SN85R_k/exec';

        let targetMovie = "";
        let currentAttempt = 0;
        let currentGuess = "";
        let isGameOver = false;
        let isEvaluating = false;

        let gems = parseInt(localStorage.getItem('gems')) || 0;
        let streak = parseInt(localStorage.getItem('streak')) || 0;
        document.getElementById('gem-count').innerText = gems;
        document.getElementById('streak-count').innerText = streak;

        async function initGame() {
            try {
                const response = await fetch(API_URL + '?nocache=' + new Date().getTime(), {
                    method: 'GET',
                    redirect: 'follow'
                });
                const data = await response.json();
                if (!data || !data.word) throw new Error("Data error");

                targetMovie = data.word.toUpperCase().replace(/[\s-]/g, ''); 
                document.getElementById('emojis').innerText = data.emojis;
                document.getElementById('category').innerText = data.cat;
                
                createBoard(targetMovie.length);
                createKeyboard();
                document.addEventListener('keydown', handlePhysicalInput);
            } catch (err) {
                document.getElementById('category').innerText = "CONNECTION ERROR";
                console.error(err);
            }
        }

        function createBoard(len) {
            const board = document.getElementById('game-board');
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                for (let j = 0; j < len; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function createKeyboard() {
            const rows = ["QWERTYUIOP", "ASDFGHJKL", "✓ZXCVBNM⌫"];
            rows.forEach((rowStr, idx) => {
                const container = document.getElementById(`kb${idx+1}`);
                const keys = rowStr.match(/✓|⌫|[A-Z]/g);
                keys.forEach(key => {
                    const btn = document.createElement('button');
                    btn.className = 'key';
                    if (key === '✓' || key === '⌫') btn.classList.add('wide');
                    btn.innerText = key === '✓' ? 'ENTER' : key === '⌫' ? 'DEL' : key;
                    btn.id = `key-${key}`;
                    btn.onclick = () => handleInput(key);
                    container.appendChild(btn);
                });
            });
        }

        function handlePhysicalInput(e) {
            if (isGameOver || isEvaluating) return;
            if (e.key === 'Enter') handleInput('✓');
            else if (e.key === 'Backspace') handleInput('⌫');
            else if (/^[a-zA-Z]$/.test(e.key)) handleInput(e.key.toUpperCase());
        }

        function handleInput(key) {
            if (isGameOver || isEvaluating) return;
            const rows = document.getElementsByClassName('row');
            const tiles = rows[currentAttempt].children;

            if (key === "⌫") {
                if (currentGuess.length > 0) {
                    currentGuess = currentGuess.slice(0, -1);
                    tiles[currentGuess.length].innerText = "";
                    tiles[currentGuess.length].classList.remove('pop');
                }
            } else if (key === "✓") {
                if (currentGuess.length === targetMovie.length) submitGuess();
            } else if (currentGuess.length < targetMovie.length) {
                tiles[currentGuess.length].innerText = key;
                tiles[currentGuess.length].classList.add('pop');
                currentGuess += key;
            }
        }

        async function submitGuess() {
            isEvaluating = true;
            const rows = document.getElementsByClassName('row');
            const tiles = rows[currentAttempt].children;
            let correctInGuess = 0;
            const targetLetters = targetMovie.split('');
            const tileStates = new Array(targetMovie.length).fill('absent');

            for (let i = 0; i < targetMovie.length; i++) {
                if (currentGuess[i] === targetLetters[i]) {
                    tileStates[i] = 'correct';
                    targetLetters[i] = null;
                    correctInGuess++;
                }
            }

            for (let i = 0; i < targetMovie.length; i++) {
                if (tileStates[i] === 'absent' && targetLetters.includes(currentGuess[i])) {
                    tileStates[i] = 'present';
                    targetLetters[targetLetters.indexOf(currentGuess[i])] = null;
                }
            }

            for (let i = 0; i < tiles.length; i++) {
                await new Promise(r => setTimeout(r, 150));
                tiles[i].classList.add('flip');
                setTimeout(() => {
                    tiles[i].classList.add(tileStates[i]);
                    updateKey(currentGuess[i], tileStates[i]);
                }, 250);
            }

            await new Promise(r => setTimeout(r, 500));
            const progress = (correctInGuess / targetMovie.length) * 100;
            document.getElementById('xp-bar').style.width = Math.max(parseInt(document.getElementById('xp-bar').style.width || 0), progress) + "%";

            if (currentGuess === targetMovie) {
                isGameOver = true;
                gems++; streak++;
                localStorage.setItem('gems', gems);
                localStorage.setItem('streak', streak);
                document.getElementById('win-msg').innerText = `Streak: ${streak} | Total Gems: ${gems}`;
                document.getElementById('overlay').style.display = "block";
                document.getElementById('win-screen').style.display = "block";
            } else if (currentAttempt >= 5) {
                isGameOver = true;
                localStorage.setItem('streak', 0);
                document.getElementById('lose-msg').innerText = `The movie was: ${targetMovie}`;
                document.getElementById('overlay').style.display = "block";
                document.getElementById('lose-screen').style.display = "block";
            } else {
                currentAttempt++;
                currentGuess = "";
                isEvaluating = false;
            }
        }

        function updateKey(letter, state) {
            const keyBtn = document.getElementById(`key-${letter}`);
            if (!keyBtn || keyBtn.classList.contains('correct')) return;
            keyBtn.classList.add(state);
        }

        initGame();
    </script>
</body>
</html>
